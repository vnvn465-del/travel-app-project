# 1. 스토리지 클래스 (어떤 드라이버를 쓸지 정의)
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-079f6e280570a31f9  # ⭐ 여기에 복사한 EFS ID를 꼭 넣어주세요!
  directoryPerms: "700"

---

# 2. PVC (실제 1GB 용량 빌리기)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: travel-image-efs-pvc  # 새로운 EFS용 PVC 이름
spec:
  accessModes:
    - ReadWriteMany           # ⭐ EFS의 장점! 여러 노드 동시 접속
  storageClassName: efs-sc
  resources:
    requests:
      storage: 1Gi
  volumeName: travel-image-efs-pv # ⭐ 위에서 만든 PV 이름과 연결
      
